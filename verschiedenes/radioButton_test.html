
<!doctype html>
<html>
<head>
<meta charset='UTF-8' />
<style>

</style>


<link rel="stylesheet" href="http://code.jquery.com/mobile/1.3.1/jquery.mobile-1.3.1.min.css" />
<script src="http://code.jquery.com/jquery-1.8.3.min.js"></script>
<script src="http://code.jquery.com/ui/1.10.0/jquery-ui.js"></script>
<script src="http://code.jquery.com/mobile/1.3.1/jquery.mobile-1.3.1.min.js"></script>
	
<script>
		( function( $, undefined ) {
			var counter = 0;
			$( document ).bind( "pageinit", function( e ) {
				$( "#prepend, #append", e.target ).on( "click", function( e ) {
					counter++;
					//$el = $( "<label for='widget" + counter + "'>Radio " + counter + "</label><input type='radio' id='widget" + counter + "'></input>" );
					$el = $( "<label for='widget" + counter + "'>Radio " + counter + "</label><input type='radio' id='widget" + counter + "'></input>" );
					//$( $el[ 1 ] ).bind( "change", action );
					$( "#controlgroup" ).controlgroup( "container" )[ $( this ).attr( "id" ) ]( $el );
					$( $el[ 1 ] ).checkboxradio();
					

				});

			});
		})( jQuery );
	</script>
	
	
<body>
	<div data-role="page" class="jqm-demos">
		<div data-role="content" class="jqm-content">

			<h1>Dynamic controlgroup</h1>

			<p>This demo shows how you can dynamically make changes to a controlgroup.</p>

			<div data-demo-html="true" data-demo-js="true">
				<div class="ui-grid-a">
					<div class="ui-block-a">
						<div data-role="fieldcontain">
							<a href="#" id="prepend" data-role="button" data-corners="true" data-inline="true">Prepend</a>
							<a href="#" id="append" data-role="button" data-corners="true" data-inline="true">Append</a>
						</div>

					</div><!-- /block-a -->
					<div class="ui-block-b">
						<form>
							<div data-role="controlgroup" id="controlgroup"></div>
						</form>
					</div><!-- /block-b -->
				</div><!-- /grid -->
			</div><!--/demo-html -->

		</div><!-- /content -->

	</div><!-- /page -->
</body>
</html>
